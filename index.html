<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, shrink-to-fit=no" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="バス時刻表" />
    <meta name="description" content="スクールバスの時刻表と乗り場案内" />

    <!--
      テーマ初期化（FOUC 防止）:
      React マウント前に <html> へ .dark を付与し、ダーク/システムダーク時の白フラッシュを防ぐ。
      キー 'campusBusNaviSettings' と theme 判定ロジックは src/hooks/useSettings.ts / App.tsx と一致させること。
    -->
    <script>
      (function () {
        try {
          var raw = localStorage.getItem('campusBusNaviSettings');
          var theme = raw ? (JSON.parse(raw).theme || 'light') : 'light';
          var dark =
            theme === 'dark' ||
            (theme === 'system' &&
              window.matchMedia &&
              window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (dark) document.documentElement.classList.add('dark');
        } catch (e) {
          /* localStorage 不可時はライトで継続 */
        }
      })();
    </script>

    <!-- Google Fonts (CSS @import を避け、ビルド時の @import 順序警告を解消) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap"
      rel="stylesheet"
    />

    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icons/icon_192x192.png" />
    <link rel="icon" type="image/png" href="/icons/icon_192x192.png" />

    <title>スクールバス時刻表</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Cloudflare Web Analytics -->
     <script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "ec62fe94ab914a7cac6dc48c586b5fd0"}'></script>
     <!-- End Cloudflare Web Analytics -->
  </body>
</html>
